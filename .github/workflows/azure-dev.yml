name: azure-dev

# Provision the AI Gateway demo infrastructure with azd, authenticating to Azure with
# the AZURE_CREDENTIALS service-principal secret. Region defaults to Sweden Central.

on:
  workflow_dispatch:
    inputs:
      location:
        description: Primary Azure region
        required: false
        default: swedencentral
      secondaryLocation:
        description: Secondary / failover region
        required: false
        default: westeurope
  push:
    branches: [ main ]
    paths:
      - 'main.bicep'
      - 'main.parameters.json'
      - 'azure.yaml'
      - '.github/workflows/azure-dev.yml'

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'ai-gateway-demo' }}
      # Default deploy region: Sweden Central (override via workflow_dispatch input or the AZURE_LOCATION repo variable).
      AZURE_LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'swedencentral' }}
      SECONDARY_LOCATION: ${{ github.event.inputs.secondaryLocation || vars.SECONDARY_LOCATION || 'westeurope' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in with azd (client credentials)
        shell: bash
        run: |
          CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .clientId)
          CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r .clientSecret)
          TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r .tenantId)
          azd auth login \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --tenant-id "$TENANT_ID"

      - name: Validate Bicep
        run: az bicep build --file main.bicep

      - name: Provision infrastructure
        run: azd provision --no-prompt
